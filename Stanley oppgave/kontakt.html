<!DOCTYPE html>
<html lang="no">
<head>
    <link rel="icon" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="img/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="img/android-chrome-192x192.png">

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Kontakt • Portefølje</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="site-header">
        <a class="Logo" href="index.html">🌐Min portefølje</a>

        <button class="nav-toggle" aria-label="Meny" aria-controls="primnav" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>

        <nav id="primnav" class="nav" hidden>
            <ul>
                <li><a href="index.html">Hjem</a></li>
                <li><a href="#">Prosjekter</a></li>
                <li><a href="#">Om meg</a></li>
                <li><a class="is-active" href="kontakt.html">Kontakt</a></li>
            </ul>
        </nav>

        <div style="display: flex; gap: 12px; align-items: center;">
            <span id="klokke" aria-live="polite"></span>
        </div>
    </header>

    <main>
        <h1>Kontakt meg</h1>
        <p>Har du spørsmål om prosjektene mine, eller vil du bare nerde litt om IT og discgolf? Send meg en melding.</p>

        <section class="contact-card">
            <h2>Kontakt</h2>

            <!-- Dette er bare frontend, ingen ekte sending -->
            <form>
                <label for="navn">Navn</label>
                <input type="text" id="navn" name="navn" placeholder="Ditt navn">

                <label for="epost">E-post</label>
                <input type="email" id="epost" name="epost" placeholder="din@epost.no">

                <label for="melding">Melding</label>
                <textarea id="melding" name="melding" placeholder="Hva vil du si?"></textarea>

                <button type="submit">Kommer ikke tilbake til deg</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
